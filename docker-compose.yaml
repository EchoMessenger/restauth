services:
  app:
    image: restauth:latest
    env_file: .env
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_DSN: postgresql://auth:admin@db:5432/tinode_auth

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tinode_auth
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: admin
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d tinode_auth"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data: